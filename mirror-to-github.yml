trigger:
  branches:
    include:
      - '*'
    exclude:
      - adf_publish
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: github-mirror

steps:
  - checkout: self
    fetchDepth: 0
    persistCredentials: true

  - script:  |
      # 1. Fetch explicite de TOUTES les branches DevOps
      git fetch origin '+refs/heads/*:refs/remotes/origin/*'
      git remote add github https://chebeno:${GITHUB_PAT}@github.com/chebeno/fifa-worldcup-data-platform.git
       # 2. Push par refspec : refs distantes → branches GitHub
      #    (fonctionne depuis un detached HEAD, aucune branche locale requise)
      git push github 'refs/remotes/origin/*:refs/heads/*' --force
      git push github --tags --force
    displayName: 'Mirror vers GitHub'
    env:
      GITHUB_PAT: $(GITHUB_PAT)