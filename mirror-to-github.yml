trigger:
  branches:
    include:
      - main            # only main branch triggers the mirror 

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: github-mirror # contains GITHUB_PAT, AZ_TENANT_ID, AZ_PRINCIPAL_ID

steps:
  - checkout: self
    fetchDepth: 0
    persistCredentials: true

  - script: |
      pip install git-filter-repo

      # 1. Matérialiser UNIQUEMENT main en branche locale
      git fetch origin '+refs/heads/main:refs/remotes/origin/main'
      git branch -f main origin/main

      # 2. Règles de caviardage (valeurs depuis le variable group)
      cat > /tmp/redactions.txt <<EOF
      ${AZ_TENANT_ID}==>REDACTED-TENANT-ID
      ${AZ_SUB_ID}==>REDACTED-SUBSCRIPTION-ID
      ${AZ_PRINCIPAL_ID}==>REDACTED-PRINCIPAL-ID
      ${AZ_STORAGE_ACCOUNT}==>redactedstorage
      EOF

      # 3. Réécrire l'historique de main seulement
      git filter-repo --replace-text /tmp/redactions.txt --refs main --force

      # 4. filter-repo supprime les remotes — on rajoute github
      git remote add github https://chebeno:${GITHUB_PAT}@github.com/chebeno/fifa-worldcup-data-platform.git

      # 5. Pousser main, et main seulement
      git push github main:main --force

      # 6. Nettoyage : supprimer sur GitHub toute autre branche résiduelle
      #    (adf_publish et compagnie, poussées par les anciens runs)
      for b in $(git ls-remote --heads github | awk '{print $2}' | sed 's|refs/heads/||' | grep -v '^main$'); do
        echo "Suppression de la branche GitHub résiduelle : $b"
        git push github --delete "$b"
      done
    displayName: 'Mirror main assaini vers GitHub'
    env:
      GITHUB_PAT: $(GITHUB_PAT)
      AZ_TENANT_ID: $(AZ_TENANT_ID)
      AZ_SUB_ID: REDACTED-SUBSCRIPTION-ID
      AZ_PRINCIPAL_ID: $(AZ_PRINCIPAL_ID)
      AZ_STORAGE_ACCOUNT: $(AZ_STORAGE_ACCOUNT)